<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Менеджер задач</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Менеджер задач</h1>
  </header>
  <main>
    <section id="add-task">
      <form id="add-task-form">
        <input type="text" id="task-title" placeholder="Название" required>
        <input type="text" id="task-desc" placeholder="Описание">
        <select id="task-category"></select>
        <input type="date" id="task-duedate">
        <label><input type="checkbox" id="task-urgent"> Срочно</label>
        <button type="submit">Добавить задачу</button>
      </form>
    </section>

    <section id="notification-area"></section>

    <section id="filters">
      <div>
        <button data-filter="all" class="active">Все</button>
        <button data-filter="active">Активные</button>
        <button data-filter="completed">Завершённые</button>
      </div>
      <select id="filter-category">
        <option value="Все">Все</option>
      </select>
      <label><input type="checkbox" id="filter-urgent"> Только срочные</label>
      <input type="text" id="search-input" placeholder="Поиск...">
    </section>

    <section id="task-list">
      <table id="tasks-table">
        <thead>
          <tr>
            <th data-sort="title">Название</th>
            <th>Категория</th>
            <th data-sort="dueDate">Срок</th>
            <th>Срочность</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button id="export-csv">Скачать CSV</button>
    </section>
  </main>

  <div id="modal-container" style="display: none;">
    <div class="modal-content">
      <h3>Редактирование задачи</h3>
      <input type="text" id="edit-title" placeholder="Название">
      <input type="text" id="edit-desc" placeholder="Описание">
      <select id="edit-category"></select>
      <input type="date" id="edit-duedate">
      <label><input type="checkbox" id="edit-urgent"> Срочно</label>
      <label><input type="checkbox" id="edit-completed"> Завершена</label>
      <button class="modal-save">Сохранить</button>
      <button class="modal-close">Отмена</button>
    </div>
  </div>

  <div id="confirm-modal" style="display: none;">
    <div class="modal-content">
      <p class="confirm-message"></p>
      <button class="confirm-yes">Да</button>
      <button class="confirm-no">Нет</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
